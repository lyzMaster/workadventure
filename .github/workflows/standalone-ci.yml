name: Standalone CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  standalone:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck standalone
        run: npm run typecheck:standalone

      - name: Run unit tests
        run: npm test -- --run

      - name: Build standalone
        run: npm run build:standalone

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run standalone E2E
        run: npm run test:e2e:standalone
