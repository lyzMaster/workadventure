<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
        <title>WorkAdventure Standalone</title>
        <style>
            html,
            body,
            #game {
                width: 100%;
                height: 100%;
                margin: 0;
                overflow: hidden;
                background: #1b2a41;
            }

            #game canvas {
                display: block;
            }
        </style>
        <script>
            (() => {
                const requests = [];
                const record = (transport, url) => {
                    requests.push({ transport, url: String(url) });
                    document.documentElement.dataset.standaloneNetworkAudit = JSON.stringify(requests);
                };

                const nativeFetch = window.fetch.bind(window);
                window.fetch = (input, init) => {
                    record("fetch", typeof input === "string" ? input : input.url);
                    return nativeFetch(input, init);
                };

                const nativeOpen = XMLHttpRequest.prototype.open;
                XMLHttpRequest.prototype.open = function (method, url, ...rest) {
                    record("xhr", url);
                    return nativeOpen.call(this, method, url, ...rest);
                };

                const NativeWebSocket = window.WebSocket;
                window.WebSocket = class AuditedWebSocket extends NativeWebSocket {
                    constructor(url, protocols) {
                        record("websocket", url);
                        super(url, protocols);
                    }
                };
            })();

            window.env = {
                NODE_ENV: "development",
                PUSHER_URL: "",
                ADMIN_URL: "",
                UPLOADER_URL: "",
                ICON_URL: "",
                PUBLIC_MAP_STORAGE_PREFIX: "",
                DEBUG_MODE: false,
                SKIP_RENDER_OPTIMIZATIONS: true,
                DISABLE_NOTIFICATIONS: true,
                DISABLE_ANONYMOUS: false,
                ENABLE_OPENID: false,
                ENABLE_MAP_EDITOR: true,
                ENABLE_CHAT: false,
                ENABLE_CHAT_UPLOAD: false,
                ENABLE_CHAT_ONLINE_LIST: false,
                ENABLE_CHAT_DISCONNECTED_LIST: false,
                ENABLE_SAY: false,
                ENABLE_ISSUE_REPORT: false,
                ENABLE_REPORT_ISSUES_MENU: false,
                MAX_USERNAME_LENGTH: 32,
                MAX_PER_GROUP: 4,
                MAX_DISPLAYED_VIDEOS: 0,
                WOKA_SPEED: 9,
                FALLBACK_LOCALE: "en-US",
            };
        </script>
    </head>
    <body>
        <div id="game"></div>
        <script type="module" src="/src/standalone/main.ts"></script>
    </body>
</html>
